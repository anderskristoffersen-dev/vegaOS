<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vega TV Prototype</title>
    <style>
      :root {
        --tv-width: 1920px;
        --tv-height: 1080px;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      * {
        box-sizing: border-box;
      }

      #tv-frame {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000000;
        overflow: hidden;
      }

      #tv-stage {
        width: var(--tv-width);
        height: var(--tv-height);
        flex-shrink: 0;
        background: #191927;
        overflow: hidden;
        position: relative;
        transform-origin: center center;
        transform: scale(
          min(
            calc(100vw / 1920),
            calc(100vh / 1080),
            1
          )
        );
      }

      #root {
        width: 100%;
        height: 100%;
      }

      /* Suppress browser default focus ring; components use Figma focus styles */
      *:focus,
      *:focus-visible {
        outline: none;
      }
    </style>
  </head>
  <body>
    <div id="tv-frame">
      <div id="tv-stage">
        <div id="root"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
